<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Manager Pro</title>
    <script type="module" crossorigin src="/assets/index-D7DxrA8E.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-T8Zk6Wwu.css">
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Library Manager <span class="badge">PRO</span></h1>
        <p>A modern dashboard to manage your books and users</p>
      </header>

      <nav class="tabs">
        <button class="tab active" data-target="books">📚 Books</button>
        <button class="tab" data-target="users">👤 Users</button>
        <button class="tab" data-target="borrow">🔄 Borrow/Return</button>
      </nav>

      <main class="content">
        <!-- BOOKS TAB -->
        <section id="books" class="tab-content active">
          <div class="glass-card">
            <h2>Add New Book</h2>
            <form id="addBookForm">
              <div class="input-group">
                <input type="text" id="bookName" placeholder="Book Title" required>
                <input type="text" id="bookAuthor" placeholder="Author" required>
              </div>
              <div class="input-group">
                <input type="text" id="bookIsbn" placeholder="ISBN" required>
                <input type="text" id="bookGenre" placeholder="Genre" required>
              </div>
              <button type="submit" class="btn btn-primary">Add Book</button>
            </form>
          </div>

          <div class="glass-card mt-4">
            <div class="flex-between">
              <h2>Book Inventory</h2>
              <input type="text" id="searchBook" class="search-bar" placeholder="Search books...">
            </div>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>ID</th><th>Title</th><th>Author</th><th>Status</th><th>Actions</th>
                  </tr>
                </thead>
                <tbody id="booksTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <!-- USERS TAB -->
        <section id="users" class="tab-content">
          <div class="glass-card">
            <h2>Register User</h2>
            <form id="addUserForm">
              <div class="input-group">
                <input type="text" id="userName" placeholder="Full Name" required>
                <input type="email" id="userEmail" placeholder="Email Address" required>
              </div>
              <button type="submit" class="btn btn-primary">Register User</button>
            </form>
          </div>

          <div class="glass-card mt-4">
            <h2>Active Users</h2>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>ID</th><th>Name</th><th>Email</th><th>Borrowed Count</th>
                  </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <!-- BORROW TAB -->
        <section id="borrow" class="tab-content">
          <div class="glass-card">
            <h2>Borrow or Return a Book</h2>
            <form id="borrowForm">
              <div class="input-group">
                <input type="number" id="borrowUserId" placeholder="User ID" required>
                <input type="number" id="borrowBookId" placeholder="Book ID" required>
              </div>
              <div class="btn-group">
                <button type="button" id="btnBorrow" class="btn btn-primary">Borrow Book</button>
                <button type="button" id="btnReturn" class="btn btn-secondary">Return Book</button>
              </div>
            </form>
            <div id="borrowResult" class="mt-2"></div>
          </div>
        </section>

      </main>
    </div>
  </body>
</html>
